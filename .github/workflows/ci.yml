name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Backend: Lint + Test + Coverage
  # ===========================================================================
  backend-quality:
    name: Backend Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements-dev.txt'

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint with ruff
        run: cd backend && ruff check . --output-format=github

      - name: Type check with mypy
        run: cd backend && mypy app --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          cd backend && pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -v
        env:
          # Disable all external services â€” in-memory fallbacks are used
          USE_OPENROUTER: false
          USE_GEMINI: false
          USE_SUPABASE: false
          USE_FIRESTORE: false
          USE_ANALYTICS: false
          USE_BIGQUERY: false
          USE_EVENT_QUEUE: false
          USE_PUBSUB: false
          ENVIRONMENT: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ===========================================================================
  # Frontend: TypeCheck + Lint + Test + Coverage
  # ===========================================================================
  frontend-quality:
    name: Frontend Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npm run typecheck

      - name: Lint with ESLint
        run: cd frontend && npm run lint

      - name: Run tests with coverage
        run: cd frontend && npm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # ===========================================================================
  # Docker: Build + Health Check
  # ===========================================================================
  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag climate-iq:${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Start container and verify health endpoint
        run: |
          docker run -d \
            --name carbon-test \
            -p 8080:8080 \
            -e USE_OPENROUTER=false \
            -e USE_GEMINI=false \
            -e USE_SUPABASE=false \
            -e USE_FIRESTORE=false \
            -e USE_ANALYTICS=false \
            -e USE_BIGQUERY=false \
            -e USE_EVENT_QUEUE=false \
            -e USE_PUBSUB=false \
            -e ENVIRONMENT=test \
            climate-iq:${{ github.sha }}

          # Wait for the container to be healthy
          echo "Waiting for app to start..."
          timeout 60 bash -c '
            until curl -sf http://localhost:8080/api/health; do
              sleep 2
            done
          '
          echo "Health check passed!"

      - name: Clean up container
        if: always()
        run: docker stop carbon-test || true
